spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      server:
        webmvc:
          routes:
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/customers/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            - id: restaurant-service
              uri: lb://restaurant-service
              predicates:
                - Path=/api/restaurants/**
            - id: delivery-service
              uri: lb://delivery-service
              predicates:
                - Path=/api/deliveries/**
            - id: discovery-service
              uri: http://discovery-service:8761
              predicates:
                - Path=/eureka/web
              filters:
                - SetPath=/
            - id: discovery-service-static
              uri: http://discovery-service:8761
              predicates:
                - Path=/eureka/**
    openfeign:
      circuitbreaker:
        enabled: true

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/

app:
  jwt:
    secret: "mysecretkeymysecretkeymysecretkeymysecretkey"
    expiration-ms: 3600000


management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,circuitbreakerevents,metrics,prometheus, ratelimiters
      base-path: /api/actuator
  endpoint:
    health:
      ratelimiters: true
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - feign.FeignException.Forbidden
          - feign.FeignException.NotFound
          - com.amalitech.fooddelivery.apigateway.exception.DuplicateResourceException
          - com.amalitech.fooddelivery.apigateway.exception.ResourceNotFoundException
          - com.amalitech.fooddelivery.apigateway.exception.UnauthorizedException
    instances:
      customerService:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 30s
    instances:
      customerService:
        baseConfig: default
  ratelimiter:
    configs:
      default:
        limitForPeriod: 2
        limitRefreshPeriod: 10s
        timeoutDuration: 10s
        register-health-indicator: true

